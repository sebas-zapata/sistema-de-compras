<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
    <link rel="shortcut icon" href="../images/favicon.png" type="image/x-icon">
    <title>ZetaPos</title>
</head>

<body>
    <nav class="navbar d-flex justify-content-between bg-dark">
        <div class="p-2">
            <a class="navbar-brand text-light" href="#"><i class="bi bi-bag-check-fill"></i> ZetaPos</a>
        </div>
        <div class="iconos p-1 d-flex gap-2">
            <button type="button " class="btn btn-outline-light" data-bs-container="body" data-bs-toggle="popover"
                data-bs-placement="bottom" data-bs-content="zapatajuan351@gmail.com">
                <i class="bi bi-envelope-at-fill"></i>
            </button>
            <button type="button " class="btn btn-outline-light" data-bs-container="body" data-bs-toggle="popover"
                data-bs-placement="top" data-bs-content="+57 3225550261">
                <i class="bi bi-telephone-fill"></i>
            </button>
            <a href="https://github.com/sebas-zapata" target="_blank">
                <button type="button " class="btn btn-outline-light" data-bs-container="body" data-bs-toggle="popover"
                    data-bs-placement="top">
                    <i class="bi bi-github"></i>
                </button>
            </a>
            <a href="https://www.linkedin.com/in/sebastian-zapata-ba221a296/" target="_blank">
                <button type="button " class="btn btn-outline-light" data-bs-container="body" data-bs-toggle="popover"
                    data-bs-placement="top">
                    <i class="bi bi-linkedin"></i>
                </button>
            </a>
        </div>
    </nav>

    <div class="container-fluid bg-light">
        <div class="d-flex justify-content-center gap-4 p-4 mb-3">
            <button class="btn btn-dark" title="Calcular compra" data-bs-toggle="modal"
                data-bs-target="#staticBackdrop"><i class="bi bi-coin"></i> Iniciar
                Compra</button>
            <button id="botonPdf" title="Imprimir Recibo" class="btn btn-dark"><i
                    class="bi bi-file-earmark-pdf-fill"></i>
                Imprimir Recibo</button>
            <button id="historialDeVentasBoton" title="Historal de Ventas" data-bs-toggle="modal"
                data-bs-target="#modalHistorialDeVentas" class="btn btn-dark"><i class="bi bi-clock-history"></i>
                Historial de Ventas</button>

        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div class="toast align-items-center text-bg-dark border-0 p-2" id="toastFacturaPdf" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-exclamation-circle-fill"></i> No hay recibo de venta disponible.
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <div class="container bg-light border border-2 rounded-2 w-auto mt-5 p-3">
        <!--Alerta-->
        <div class="alert d-none w-75 m-auto mb-2 alert-dismissible fade show" id="alerta" role="alert">
            <p class="fw-bold" id="mensajeAlerta"></p>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row">
            <!--Factura de venta dinamica-->
            <div class="col-lg-12">
                <div class="alert alert-dark ms-2" id="recibo" role="alert">
                    <h1 id="total" class="ms-2 fs-4"></h1>
                    <h5 id="devuelta" class="ms-2 text-dark fw-bold"></h5>
                    <h5 id="valorUnitario" class="ms-2"></h5>
                    <h5 id="producto" class="ms-2 text-secondary"></h5>
                    <h6 id="cantidad" class="ms-2 text-secondary"></h6>
                    <strong>
                        <p id="fechaCompra" class="ms-2 text-dark"></p>
                    </strong>
                </div>

            </div>
        </div>
    </div>

    <!-- Modal Registrar Venta -->
    <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
        aria-labelledby="staticBackdropLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="staticBackdropLabel">Nueva Venta</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form class="needs-validation" id="formularioVenta" novalidate>
                        <div class="mb-3">
                            <label for="cedulaCliente" class="form-label">Cedula Cliente</label>
                            <input type="number" id="cedulaCliente" class="form-control" required>
                            <div class="valid-feedback">¡Correcto!</div>
                            <div class="invalid-feedback">Por favor, ingrese una cedula valida.</div>
                        </div>
                        <div class="mb-3">
                            <label for="productoVenta" class="form-label">Producto</label>
                            <input type="text" id="productoVenta" class="form-control" required>
                            <div class="valid-feedback">¡Correcto!</div>
                            <div class="invalid-feedback">Por favor, ingrese un producto.</div>
                        </div>

                        <div class="mb-3">
                            <label for="cantidadVenta" class="form-label">Cantidad</label>
                            <input type="number" id="cantidadVenta" min="1" step="1" class="form-control" required>
                            <div class="valid-feedback">¡Correcto!</div>
                            <div class="invalid-feedback">Ingrese un cantidad válida.</div>
                        </div>

                        <div class="mb-3">
                            <label for="valorUnitarioVenta" class="form-label">Valor Unitario</label>
                            <input type="number" min="1" step="1" class="form-control" id="valorUnitarioVenta" required>
                            <div class="valid-feedback">¡Correcto!</div>
                            <div class="invalid-feedback">Ingrese un valor válido.</div>
                        </div>
                        <div class="mb-3 text-center">
                            <p id="totalApagarVenta" class="text-dark fw-bold"></p>
                        </div>

                        <div class="mb-3">
                            <label for="valorApagarVenta" class="form-label">Valor a Pagar</label>
                            <input type="number" min="1" step="1" class="form-control" id="valorApagarVenta" required>
                            <div class="valid-feedback">¡Correcto!</div>
                            <div class="invalid-feedback">Ingrese un valor válido a pagar.</div>
                        </div>


                        <button class="btn btn-dark w-100" type="submit"><i class="bi bi-bag-plus-fill"></i> Registrar
                            Venta</button>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <!-- Modal Historial de Ventas -->
    <div class="modal fade" id="modalHistorialDeVentas" tabindex="-1" aria-labelledby="exampleModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Total de Ventas: </h1><span id="numeroDeVentas"
                        class="badge ms-2 text-bg-dark"></span>
                    <strong class="modal-title ms-2 text-end text-dark" id="fechaActual"></strong>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div id="bodyModalHistorialDeVentas" class="modal-body text-center">
                </div>
                <div class="modal-footer" id="footerModalHistorialDeVentas">
                    <button type="button" id="borrarVentas" class="btn btn-secondary"><i class="bi bi-trash3-fill"></i>
                        Limpiar Ventas</button>
                    <button type="button" id="botonCalcularTotalAcumulado" class="btn btn-dark"><i
                            class="bi bi-currency-dollar"></i> Calcular
                        total</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/js/bootstrap.min.js"></script>
    <script src="app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>

</html>
